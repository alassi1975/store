<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenApp - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="deco-circle deco-circle--1"></div>
        <div class="deco-circle deco-circle--2"></div>
        <div class="deco-circle deco-circle--3"></div>
        <div class="deco-circle deco-circle--4"></div>

        <div class="login-card">
            <div class="brand">
                <img src="../logo.png" alt="Logo" class="login-logo">
                <span>مخزن</span>
                <span class="brand-sub">مستشفى شهداء الاقصى</span>
            </div>

            <div id="loginForm" class="form-panel">
                <h1 class="form-title">تسجيل الدخول</h1>
                <p class="form-subtitle">سجل دخولك للمتابعة</p>

                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8EA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" id="loginUser" placeholder="اسم المستخدم" autocomplete="off">
                </div>

                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8EA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="loginPass" placeholder="كلمة المرور" autocomplete="off">
                </div>

                <p id="loginError" class="error-msg">اسم المستخدم أو كلمة المرور غير صحيحة</p>

                <button class="btn-signin" onclick="app.login()">دخول</button>
            </div>

            <div id="setupForm" class="form-panel" style="display:none">
                <h1 class="form-title">إنشاء حساب</h1>
                <p class="form-subtitle">إنشاء حساب المشرف الأول</p>

                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8EA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </span>
                    <input type="text" id="setupUser" placeholder="اسم المستخدم" autocomplete="off">
                </div>
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8EA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="setupPass" placeholder="كلمة المرور" autocomplete="off">
                </div>
                <div class="input-group">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8E8EA0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input type="password" id="setupConfirm" placeholder="تأكيد كلمة المرور" autocomplete="off">
                </div>

                <p id="setupError" class="error-msg"></p>

                <button class="btn-signin" onclick="app.setup()">حفظ</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
